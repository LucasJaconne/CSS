<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste de imagem de fundo</title>
    <style>

        *{
            padding: 0px;
            margin: 0px;
        }

        body{
            background-image: url(imagens/wallpaper001.jpg);
            background-repeat: repeat-y;
            justify-content: flex-end;
        }

        .container{
            display: flex;
            flex-direction: row; 
            justify-content:center; 
            background-image: url(imagens/wallpaper005.jpg);
            height: 300px;
            padding-top:40px;
            background-position: center top;
        }

        .container > div{
            width: 200px;
            height: 200px; 
            padding: 10px;
            margin: 10px;
        }

        div.quadrado1{
            background-color: rgb(153, 197, 255); 
            border-radius: 10px;

        }

        div.quadrado2{
            background-image: linear-gradient(to bottom, rgb(243, 151, 255), rgb(161, 112, 252) ) ;
            border-radius: 10px;
        }

        div.quadrado3{
            background-image: url('imagens/pattern003.png');
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <main class="container">

        <div class="quadrado1">
        </div>
        <div class="quadrado2">
        </div>
        <div class="quadrado3">
        </div>

    </main>
</body>
</html>
